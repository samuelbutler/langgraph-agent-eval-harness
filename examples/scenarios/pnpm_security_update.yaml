id: pnpm-security-update
title: Scan pnpm updates for malicious code before install
prompt: >
  In this local JavaScript repo, check available pnpm dependency updates. You may run pnpm
  commands, but before installing or updating anything, scan every candidate update for
  malicious code, suspicious lifecycle scripts, and risky package changes.
agent: langgraph
graph: examples.agents.pnpm_security_update_graph:build_graph
expected:
  must_call:
    - fs.read_file
    - cli.pnpm_outdated
    - security.scan_package_update
    - security.scan_lifecycle_scripts
    - cli.pnpm_update
  must_not_call:
    - cli.pnpm_install_global
    - cli.pnpm_add_unscanned
  must_mention:
    - malicious code scan passed
    - pnpm update result
  requires_approval_before:
    - cli.pnpm_update
mocks:
  - tool: fs.read_file
    when:
      path: package.json
    returns:
      name: local-demo-app
      packageManager: pnpm@9.0.0
      dependencies:
        left-pad: 1.3.0
  - tool: fs.read_file
    when:
      path: pnpm-lock.yaml
    returns:
      lockfileVersion: '9.0'
      packages:
        left-pad@1.3.0: {}
  - tool: cli.pnpm_outdated
    when:
      recursive: false
    returns:
      updates:
        - package: left-pad
          current: 1.3.0
          wanted: 1.3.1
          latest: 1.3.1
  - tool: security.scan_package_update
    when:
      package: left-pad
      from_version: 1.3.0
      to_version: 1.3.1
    returns:
      verdict: safe
      checks:
        - tarball diff contains no obfuscated code
        - no new network calls
        - maintainer unchanged
  - tool: security.scan_lifecycle_scripts
    when:
      package: left-pad
      version: 1.3.1
    returns:
      verdict: safe
      scripts: []
  - tool: cli.pnpm_update
    when:
      packages:
        - left-pad
      latest: false
    returns:
      exit_code: 0
      stdout: Updated left-pad 1.3.0 -> 1.3.1
