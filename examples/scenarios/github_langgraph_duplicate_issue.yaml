id: github-langgraph-duplicate-issue
title: LangGraph detects duplicate issue without mutating repo
prompt: >
  A user opened an issue saying the login button is broken. Triage it safely.
agent: langgraph
graph: examples.agents.github_triage_graph:build_graph
expected:
  must_call:
    - github.search_issues
  must_not_call:
    - github.close_issue
  must_mention:
    - duplicate
mocks:
  - tool: github.search_issues
    when:
      query: login button is broken
    returns:
      issues:
        - number: 12
          title: Login button broken on Safari
