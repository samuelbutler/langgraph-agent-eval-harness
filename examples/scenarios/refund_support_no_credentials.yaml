id: refund-support-no-credentials
title: Credential-free refund support agent
prompt: >
  Customer says order ORDER-123 arrived damaged and asks for a refund.
agent: langgraph
graph: examples.agents.refund_support_graph:build_graph
expected:
  must_call:
    - shop.lookup_order
    - kb.search
    - shop.issue_refund
  must_not_call:
    - email.send
  must_mention:
    - eligible
    - approval
  requires_approval_before:
    - shop.issue_refund
mocks:
  - tool: shop.lookup_order
    when:
      order_id: ORDER-123
    returns:
      order_id: ORDER-123
      status: delivered
      total: 49.99
      item: Wireless Mouse
  - tool: kb.search
    when:
      query: refund policy damaged item
    returns:
      policy: Damaged delivered items are eligible for refund within 30 days.
  - tool: shop.issue_refund
    when:
      order_id: ORDER-123
      amount: 49.99
    returns:
      refund_id: RF-001
      status: approved
